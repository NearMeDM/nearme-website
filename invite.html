<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    IMPORTANT: Identity widget MUST be the very first script.
    It reads the #invite_token from the URL on load.
    Any other script running first can clear the hash.
  -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Set Your Password — NearMe Admin</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans','Segoe UI',system-ui,sans-serif;background:#060d1e;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{background:#0d1f3c;border:1.5px solid rgba(201,153,58,.3);border-radius:22px;padding:44px 38px;max-width:420px;width:100%;text-align:center;box-shadow:0 32px 80px rgba(0,0,0,.5)}
    .logo{width:56px;height:56px;background:linear-gradient(135deg,#e8c46a,#c9993a);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 20px}
    h1{font-size:22px;font-weight:700;color:#e8c46a;margin-bottom:10px}
    p{font-size:14px;color:#94a3b8;line-height:1.75;margin-bottom:0}
    .spinner{width:36px;height:36px;border:3px solid rgba(201,153,58,.2);border-top-color:#c9993a;border-radius:50%;animation:spin .75s linear infinite;margin:20px auto 0}
    @keyframes spin{to{transform:rotate(360deg)}}
    .back{display:block;margin-top:24px;font-size:13px;color:#475569;text-decoration:none}
    .back:hover{color:#94a3b8}
    .success{color:#10b981}
    .error-text{color:#ef4444;font-size:13px;margin-top:16px;line-height:1.6}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📍</div>
    <h1 id="cardTitle">Setting Up Your Account</h1>
    <p id="cardMsg">The password setup window will appear in a moment…</p>
    <div class="spinner" id="spinner"></div>
    <p class="error-text" id="errorMsg" style="display:none"></p>
    <a href="/" class="back">← Back to website</a>
  </div>

  <script>
  (function(){
    var title   = document.getElementById('cardTitle');
    var msg     = document.getElementById('cardMsg');
    var spinner = document.getElementById('spinner');
    var errMsg  = document.getElementById('errorMsg');

    function setUI(t, m, showSpinner){
      title.textContent   = t;
      msg.textContent     = m;
      spinner.style.display = showSpinner ? 'block' : 'none';
    }
    function showError(text){
      spinner.style.display = 'none';
      errMsg.style.display  = 'block';
      errMsg.textContent    = text;
      title.textContent     = '⚠️ Problem with invite link';
      msg.textContent       = 'Please ask Partha to send a new invite:';
    }

    var widget = window.netlifyIdentity;

    if(!widget){
      showError('Identity widget failed to load. Please refresh and try again.');
      return;
    }

    // Successful password set → go to admin
    widget.on('login', function(){
      setUI('✅ Password Set!', 'Redirecting you to the admin panel…', true);
      setTimeout(function(){ window.location.href = '/admin/'; }, 800);
    });

    widget.on('error', function(err){
      showError((err && err.message) || 'Unknown error. Try refreshing and clicking the invite link again.');
    });

    widget.on('close', function(){
      // If they close the modal without setting password
      if(!widget.currentUser()){
        setUI('Set Your Password', 'Click the link in your invite email again to reopen the password screen.', false);
      }
    });

    // Check for token
    var hash = window.location.hash || '';
    var TOKEN_KEYS = ['invite_token','recovery_token','confirmation_token'];
    var hasToken = TOKEN_KEYS.some(function(k){ return hash.indexOf(k+'=') > -1; });

    if(hasToken){
      // Widget already read the token when it loaded (it was first script).
      // Just open it — it will show the Set Password screen automatically.
      widget.open();
    } else {
      showError('No invite token found in this URL. Please use the exact link from your invite email — do not copy/paste just the domain.');
    }
  })();
  </script>
</body>
</html>
