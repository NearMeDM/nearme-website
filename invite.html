<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Set Your Password — NearMe Admin</title>

  <!-- Netlify Identity Widget MUST be in <head> -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #060d1e;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #0d1f3c;
      border: 1px solid rgba(201,153,58,.25);
      border-radius: 20px;
      padding: 40px 36px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .logo {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #e8c46a, #c9993a);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin: 0 auto 20px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #e8c46a;
      margin-bottom: 10px;
    }
    p {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.7;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #e8c46a, #c9993a);
      color: #060d1e;
      font-weight: 700;
      font-size: 15px;
      padding: 13px 32px;
      border-radius: 100px;
      border: none;
      cursor: pointer;
      width: 100%;
      font-family: inherit;
      transition: opacity .2s;
    }
    .btn:hover { opacity: 0.9; }
    .status {
      margin-top: 20px;
      font-size: 13px;
      color: #64748b;
      min-height: 20px;
    }
    .status.success { color: #10b981; }
    .status.error { color: #ef4444; }
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(201,153,58,.3);
      border-top-color: #c9993a;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .back {
      display: block;
      margin-top: 18px;
      font-size: 13px;
      color: #475569;
      text-decoration: none;
    }
    .back:hover { color: #94a3b8; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">📍</div>
  <h1>Set Your Admin Password</h1>
  <p>You have been invited to manage the NearMe blog. Click the button below to set your password and access the admin panel.</p>

  <button class="btn" id="setPasswordBtn" onclick="openWidget()">
    Set My Password →
  </button>

  <div class="status" id="status"></div>
  <a href="/" class="back">← Back to website</a>
</div>

<script>
  var status = document.getElementById('status');
  var btn = document.getElementById('setPasswordBtn');

  function showStatus(msg, type) {
    status.textContent = msg;
    status.className = 'status ' + (type || '');
  }

  function openWidget() {
    if (!window.netlifyIdentity) {
      showStatus('Identity widget not loaded. Please refresh the page.', 'error');
      return;
    }
    window.netlifyIdentity.open();
  }

  // ── Initialise Identity widget ──
  document.addEventListener('DOMContentLoaded', function() {

    if (!window.netlifyIdentity) {
      showStatus('⚠️ Could not load Identity widget. Check your internet connection.', 'error');
      return;
    }

    // On successful login / password set → go to admin
    window.netlifyIdentity.on('login', function(user) {
      showStatus('✅ Password set! Redirecting to admin…', 'success');
      btn.disabled = true;
      setTimeout(function() {
        window.location.href = '/admin/';
      }, 1000);
    });

    // Widget opened
    window.netlifyIdentity.on('open', function() {
      showStatus('<span class="spinner"></span> Waiting for password…');
    });

    // Widget closed without login
    window.netlifyIdentity.on('close', function() {
      if (!window.netlifyIdentity.currentUser()) {
        showStatus('');
      }
    });

    // Error handler
    window.netlifyIdentity.on('error', function(err) {
      console.error('Identity error:', err);
      showStatus('❌ Error: ' + (err.message || err), 'error');
    });

    // Check for token in URL — auto-open widget if token present
    var hash = window.location.hash;
    if (hash && (
      hash.indexOf('invite_token=') > -1 ||
      hash.indexOf('recovery_token=') > -1 ||
      hash.indexOf('confirmation_token=') > -1
    )) {
      showStatus('🔑 Invite detected — opening password screen…');
      // Short delay so widget fully initialises before opening
      setTimeout(function() {
        window.netlifyIdentity.open();
      }, 500);
    } else {
      // No token — they may have navigated here directly
      showStatus('No invite token found in URL. Use the link from your invite email.');
    }
  });
</script>

</body>
</html>
