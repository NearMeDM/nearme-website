<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    Netlify Identity Widget MUST load first — before any other script.
    It reads window.location.hash on load and processes the token internally.
    Once it has the token it knows to show "Set password" not "Login".
  -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Set Your Password — NearMe Admin</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans','Segoe UI',system-ui,sans-serif;background:#060d1e;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;flex-direction:column;gap:20px}
    .card{background:#0d1f3c;border:1.5px solid rgba(201,153,58,.3);border-radius:22px;padding:40px 36px;max-width:440px;width:100%;text-align:center;box-shadow:0 32px 80px rgba(0,0,0,.5)}
    .logo{width:56px;height:56px;background:linear-gradient(135deg,#e8c46a,#c9993a);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:20px}
    h1{font-size:21px;font-weight:700;color:#e8c46a;margin-bottom:8px}
    p{font-size:13.5px;color:#64748b;line-height:1.7;margin-bottom:0}
    .spinner{width:36px;height:36px;border:3px solid rgba(201,153,58,.15);border-top-color:#c9993a;border-radius:50%;animation:spin .75s linear infinite;margin:20px auto 0}
    @keyframes spin{to{transform:rotate(360deg)}}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,#e8c46a,#c9993a);color:#060d1e;border:none;padding:14px 28px;border-radius:100px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;width:100%;margin-top:20px;transition:opacity .2s}
    .btn:hover{opacity:.9}
    .msg{margin-top:16px;padding:12px 16px;border-radius:12px;font-size:13px;line-height:1.65;text-align:left}
    .msg.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5}
    .msg.success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:#6ee7b7}
    .msg.warn{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);color:#fcd34d}
    hr{border:none;border-top:1px solid rgba(201,153,58,.1);margin:24px 0}
    .back{font-size:12px;color:#334155;text-decoration:none}
    .back:hover{color:#64748b}
    /* Force the Netlify Identity modal to sit on top */
    [data-netlify-identity-widget]{z-index:99999!important}
  </style>
</head>
<body>

<div class="card" id="card">
  <div class="logo">📍</div>
  <h1 id="title">Setting Up Your Account</h1>
  <p id="subtitle">Please wait — loading the password setup screen…</p>
  <div class="spinner" id="spinner"></div>
  <div id="msgArea"></div>
  <button class="btn" id="openBtn" style="display:none" onclick="tryOpen()">
    Open Password Setup →
  </button>
  <hr>
  <a href="/" class="back">← Back to website</a>
</div>

<script>
(function(){

  /* ── Helpers ── */
  function el(id){ return document.getElementById(id); }
  function setUI(title, sub, showSpinner, showBtn){
    el('title').textContent   = title;
    el('subtitle').textContent = sub;
    el('spinner').style.display = showSpinner ? 'block' : 'none';
    el('openBtn').style.display = showBtn    ? 'block' : 'none';
  }
  function showMsg(text, type){
    el('msgArea').innerHTML = '<div class="msg '+type+'">'+text+'</div>';
  }

  /* ── Read token from URL ── */
  var hash   = window.location.hash || '';
  var params = {};
  hash.replace(/^#/,'').split('&').forEach(function(p){
    var kv = p.split('=');
    if(kv.length >= 2) params[kv[0]] = kv.slice(1).join('=');
  });

  var token     = params['invite_token'] || params['recovery_token'] || null;
  var tokenType = params['invite_token'] ? 'invite' : params['recovery_token'] ? 'recovery' : null;

  if(!token){
    setUI('No Invite Token Found','',false,false);
    showMsg('Please click the exact link from your invite email.<br><br>Need a new invite? Contact Partha: <strong style="color:#94a3b8">+91 7001 069 520</strong>','error');
    return;
  }

  if(tokenType === 'recovery'){
    setUI('Reset Your Password','Loading password reset screen…',true,false);
  }

  /* ── Wait for widget to be ready then open it ── */
  function tryOpen(){
    var w = window.netlifyIdentity;
    if(!w){
      showMsg('Widget not loaded yet. Please refresh the page.','error');
      return;
    }
    w.open();
  }
  window.tryOpen = tryOpen;

  function initWidget(){
    var w = window.netlifyIdentity;
    if(!w){
      setUI('Widget Failed to Load','',false,false);
      showMsg('The identity widget could not load. Please refresh the page.','error');
      return;
    }

    /* ── On successful login/signup ── */
    w.on('login', function(user){
      setUI('✅ Password Set!','Redirecting to admin panel…',true,false);
      el('msgArea').innerHTML = '';
      setTimeout(function(){ window.location.href = '/admin/'; }, 800);
    });

    /* ── On error ── */
    w.on('error', function(err){
      var msg = (err && (err.message || err.error_description || JSON.stringify(err))) || 'Unknown error';
      setUI('Something Went Wrong','',false,false);
      showMsg('Error: '+msg+'<br><br>This usually means the invite link has <strong>expired</strong>. Ask Partha to send a new invite: <strong style="color:#94a3b8">+91 7001 069 520</strong>','error');
    });

    /* ── Open the widget ── */
    /* The widget already has the token since it was the first script to load.
       Calling open() now triggers the Set Password UI. */
    w.open();

    /* If widget doesn't open after 3 seconds, show manual button */
    setTimeout(function(){
      /* Check if widget modal is visible in DOM */
      var modal = document.querySelector('[data-netlify-identity-widget]') ||
                  document.querySelector('.netlify-identity-widget') ||
                  document.querySelector('iframe[src*="identity"]');
      if(!modal){
        setUI('Tap to Set Password','The popup did not open automatically.',false,true);
        showMsg('Click the button above to open the password setup screen.','warn');
      } else {
        /* Modal opened fine — update status */
        setUI('Set Your Password in the Popup','A popup window has appeared. Enter your new password there.',false,false);
      }
    }, 3000);
  }

  /* ── Widget loads async — wait for it ── */
  if(window.netlifyIdentity){
    /* Already available */
    initWidget();
  } else {
    /* Poll every 200ms up to 10 seconds */
    var waited = 0;
    var poll = setInterval(function(){
      waited += 200;
      if(window.netlifyIdentity){
        clearInterval(poll);
        initWidget();
      } else if(waited >= 10000){
        clearInterval(poll);
        setUI('Widget Failed to Load','',false,false);
        showMsg('The Netlify Identity widget could not load after 10 seconds.<br><br>'
          +'Please check your internet connection and refresh the page.','error');
      }
    }, 200);
  }

})();
</script>

</body>
</html>
