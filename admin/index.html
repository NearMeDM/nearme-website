<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Identity widget FIRST — Decap CMS needs window.netlifyIdentity -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>NearMe Blog Admin</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#060d1e;color:#e2e8f0;min-height:100vh}
    /* Loading screen */
    #cms-loading{position:fixed;inset:0;background:#060d1e;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:9999;transition:opacity .4s}
    #cms-loading.hidden{opacity:0;pointer-events:none}
    .ll{width:52px;height:52px;background:linear-gradient(135deg,#e8c46a,#c9993a);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px}
    .lt{font-size:21px;font-weight:700;color:#e8c46a}
    .ls{font-size:13px;color:#64748b;text-align:center;max-width:280px;line-height:1.65}
    .sp{width:34px;height:34px;border:3px solid rgba(201,153,58,.15);border-top-color:#c9993a;border-radius:50%;animation:sp .8s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}
    /* Reset password helper box */
    #reset-helper{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:99999;background:#0d1f3c;border:1.5px solid rgba(201,153,58,.3);border-radius:16px;padding:18px 24px;max-width:400px;width:92%;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,.5)}
    #reset-helper h3{color:#e8c46a;font-size:15px;font-weight:700;margin-bottom:8px}
    #reset-helper p{color:#94a3b8;font-size:12.5px;line-height:1.6;margin-bottom:14px}
    .reset-input{width:100%;background:#060d1e;border:1.5px solid rgba(201,153,58,.2);color:#f0f4ff;padding:11px 14px;border-radius:10px;font-size:14px;font-family:inherit;outline:none;margin-bottom:10px}
    .reset-input:focus{border-color:#c9993a}
    .reset-btn{width:100%;background:linear-gradient(135deg,#e8c46a,#c9993a);color:#060d1e;border:none;padding:12px;border-radius:100px;font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit}
    .reset-btn:hover{opacity:.9}
    .reset-msg{font-size:12px;margin-top:8px;min-height:16px;color:#6ee7b7}
    .close-helper{position:absolute;top:10px;right:14px;background:none;border:none;color:#475569;font-size:18px;cursor:pointer;line-height:1}
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div id="cms-loading">
    <div class="ll">📍</div>
    <div class="lt">NearMe Blog Admin</div>
    <div class="sp"></div>
    <div class="ls" id="loading-status">Loading editor…</div>
  </div>

  <!-- Forgot password helper — appears after 4s if login form is visible -->
  <div id="reset-helper">
    <button class="close-helper" onclick="document.getElementById('reset-helper').style.display='none'">✕</button>
    <h3>🔑 Forgot Your Password?</h3>
    <p>Enter your email to receive a password reset link. Check your inbox and click the link to set a new password.</p>
    <input type="email" class="reset-input" id="reset-email" placeholder="your@email.com">
    <button class="reset-btn" onclick="sendReset()">Send Reset Email →</button>
    <div class="reset-msg" id="reset-msg"></div>
  </div>

  <script>
    var status = document.getElementById('loading-status');

    // ── Send password reset via Netlify Identity API ──────────────
    window.sendReset = function(){
      var email = document.getElementById('reset-email').value.trim();
      var msg   = document.getElementById('reset-msg');
      if(!email || !email.includes('@')){
        msg.style.color = '#fca5a5';
        msg.textContent = 'Please enter a valid email address.';
        return;
      }
      msg.style.color = '#fcd34d';
      msg.textContent = 'Sending…';

      fetch('/.netlify/identity/recover', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({email: email})
      })
      .then(function(r){
        msg.style.color = '#6ee7b7';
        msg.textContent = '✅ Reset email sent! Check your inbox and click the link.';
      })
      .catch(function(){
        // Even on network error Netlify usually processes it
        msg.style.color = '#6ee7b7';
        msg.textContent = '✅ If that email exists, a reset link has been sent.';
      });
    };

    // Allow Enter on email field
    document.getElementById('reset-email').addEventListener('keydown', function(e){
      if(e.key === 'Enter') window.sendReset();
    });

    // ── Watch for Decap CMS to mount ─────────────────────────────
    var cmsTimeout = setTimeout(function(){
      document.getElementById('cms-loading').classList.add('hidden');
      // Show reset helper after 4s — user is likely on login screen
      setTimeout(function(){
        document.getElementById('reset-helper').style.display = 'block';
      }, 4000);
    }, 8000);

    var obs = new MutationObserver(function(){
      if(document.getElementById('nc-root')){
        clearTimeout(cmsTimeout);
        document.getElementById('cms-loading').classList.add('hidden');
        obs.disconnect();
        // Show reset helper after 3s in case login form is visible
        setTimeout(function(){
          var loginForm = document.querySelector('[data-testid="login"]') ||
                          document.querySelector('form[action*="identity"]') ||
                          document.querySelector('.nc-login');
          if(loginForm){
            document.getElementById('reset-helper').style.display = 'block';
          } else {
            // CMS loaded and user is logged in — show it anyway as helper
            setTimeout(function(){
              document.getElementById('reset-helper').style.display = 'block';
            }, 5000);
          }
        }, 3000);
      }
    });
    obs.observe(document.body, {childList:true, subtree:true});

    // ── Load Decap CMS ────────────────────────────────────────────
    function loadFallback(){
      status.textContent = 'Trying backup server…';
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/decap-cms@3.3.3/dist/decap-cms.js';
      s.onerror = function(){
        document.getElementById('cms-loading').classList.add('hidden');
        document.getElementById('reset-helper').style.display = 'block';
      };
      document.head.appendChild(s);
    }
  </script>

  <!-- Decap CMS — pinned stable version -->
  <script
    src="https://unpkg.com/decap-cms@3.3.3/dist/decap-cms.js"
    onerror="loadFallback()">
  </script>

</body>
</html>
