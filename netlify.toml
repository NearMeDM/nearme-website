# ═══════════════════════════════════════════════════════════
#  NearMe Digital Marketing Agency — Netlify Config
# ═══════════════════════════════════════════════════════════

[build]
  publish = "."
  command = ""

# ── Redirects ──────────────────────────────────────────────
# IMPORTANT: Do NOT add a /blog redirect — causes a loop on static sites.

[[redirects]]
  from = "/admin"
  to   = "/admin/"
  status = 301

# Route invite/recovery links to dedicated invite.html page
# This fixes the "shows login instead of set-password" problem
[[redirects]]
  from = "/"
  to   = "/invite.html"
  status = 200
  conditions = {Query = ["invite_token"]}

[[redirects]]
  from = "/"
  to   = "/invite.html"
  status = 200
  conditions = {Query = ["recovery_token"]}

# NOTE: The /* catch-all below is intentionally removed.
# On static HTML sites it intercepts /blog and causes 404s.
# Each folder with an index.html is served automatically by Netlify.

# ── HTTP Headers (Security + Performance) ──────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "SAMEORIGIN"
    X-XSS-Protection          = "1; mode=block"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"

# Cache HTML — short (always fresh)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Cache images — long
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache CSS/JS
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"
